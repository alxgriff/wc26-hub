name: daily-build

# The morning pipeline (7:00 AM ET during the tournament): enter overnight
# results, settle yesterday's picks, log today's predictions, snapshot odds,
# record picks, generate the stakes blurb, rebuild the site + edition, push.
# The push IS the deploy (Cloudflare Pages watches main).
#
# Fail-soft design: data-gathering steps carry continue-on-error and surface
# warnings in the job summary — a dead API never blocks the morning publish,
# and nothing is ever invented (missing data renders as the placeholder
# state, which the site and editions flag loudly). Tests and the site build
# are HARD gates: a red test suite publishes nothing.

on:
  schedule:
    # 07:00 ET (EDT). The whole tournament: group stage + knockout, June 12
    # through the July 19 final. Two ranges because a cron day-of-month field
    # can't span across the June/July boundary. Re-derive if DST assumptions change.
    - cron: "0 11 12-30 6 *"   # June 12-30 (group stage + R32 start June 28)
    - cron: "0 11 1-19 7 *"    # July 1-19 (R16 -> Final July 19)
  workflow_dispatch:
    inputs:
      date:
        description: "Editorial date YYYY-MM-DD (default: today ET)"
        required: false
      gather_news:
        description: "Run the UNVERIFIED news digest"
        type: boolean
        default: false

permissions:
  contents: write

# Shared with closing-odds.yml: both workflows push to main, so they must
# never run concurrently (a mid-run push rejects the other's publish).
concurrency:
  group: wc26-publish
  cancel-in-progress: false

# Explicit bash => `-o pipefail`: without it, `python ... | tee` takes tee's
# exit code and a failing step reads as success, blinding the health gate.
defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Editorial date (ET)
        id: ed
        env:
          DATE_IN: ${{ inputs.date }}   # env-routed: never template-expand into the script
        run: |
          DATE="${DATE_IN:-$(TZ=America/New_York date +%F)}"
          if ! [[ "$DATE" =~ ^2026-[01][0-9]-[0-3][0-9]$ ]]; then
            echo "::error::bad date input '$DATE' (need YYYY-MM-DD)"; exit 1
          fi
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          # knockout-stage gate: the R32 starts 2026-06-28. Knockout steps below only run from
          # then on, so the whole knockout stack stays dormant through the group stage.
          KO=$([[ "$DATE" > "2026-06-27" ]] && echo true || echo false)
          echo "ko=$KO" >> "$GITHUB_OUTPUT"
          echo "Editorial date: $DATE (knockout=$KO)" >> "$GITHUB_STEP_SUMMARY"

      # HARD GATE — runs on the PRISTINE checkout, before any step below mutates
      # the working tree. It guards against CODE regressions deterministically
      # (identical basis to ci.yml: committed code + committed data); a red suite
      # publishes nothing. It must run pre-mutation: several site/honesty tests
      # read the live data/ files and assert point-in-time world state, so
      # running them AFTER fetch_results/settle/record turns normal overnight
      # data evolution into a false red — which blocked the 2026-06-13 publish.
      # Data-shape breakage on freshly fetched data still fails loudly at the
      # (hard) "Build site" step further down.
      - name: Tests (hard gate — red suite publishes nothing)
        run: python -m unittest discover -s tests

      # Roll Elo forward through played WC results (after the pre-mutation test gate, before
      # we log today's slate, so the day's predictions use current Elo). Reads committed
      # fixtures (results land via the overnight closing-odds runs); writes the gitignored
      # CURRENT file the model prefers. Fail-soft: if it errors, the model falls back to the
      # VERIFIED anchor. Leak-free — rolls PLAYED games only; today's games are unplayed.
      - name: Update Elo (roll verified baseline through WC results)
        id: elo
        continue-on-error: true
        run: python scripts/update_elo.py | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Install Anthropic SDK (blurb + news)
        id: sdk
        continue-on-error: true
        run: pip install anthropic

      # Log today's slate FIRST — before any kickoff and before results land — so
      # an accountable pre-kickoff call is never missed (a late run on 2026-06-12
      # logged B1 four minutes after kickoff and lost it permanently; immutable,
      # no backfill). A MISSED row now exits non-zero -> health gate -> red run.
      - name: Log today's slate predictions (the accountable numbers)
        id: ledger
        continue-on-error: true
        run: python scripts/ledger.py log "${{ steps.ed.outputs.date }}" | tee -a "$GITHUB_STEP_SUMMARY"

      # Log today's KNOCKOUT advance calls pre-kickoff too (no-op until ties resolve).
      - name: Log knockout advance calls (pre-kickoff)
        id: ko_ledger
        if: ${{ steps.ed.outputs.ko == 'true' }}
        continue-on-error: true
        run: python scripts/ledger.py log-ko "${{ steps.ed.outputs.date }}" | tee -a "$GITHUB_STEP_SUMMARY"

      # Group results only — skipped in the knockout stage (all 72 group games are already in,
      # so the /scores call enters nothing and just burns Odds-API credits; the knockout results
      # step below covers R32+). Saves ~2 credits/run against the ~500/month free tier.
      - name: Enter overnight results (The Odds API — group games)
        id: results
        if: ${{ steps.ed.outputs.ko != 'true' }}
        continue-on-error: true
        run: python scripts/fetch_results.py | tee -a "$GITHUB_STEP_SUMMARY"

      # Knockout stage (no-op while data/knockout.csv has no resolved ties): materialize
      # R32/feeder matchups from the freshly-updated standings, then pull any completed
      # knockout scores. Level/penalty results are reported for manual entry, never guessed.
      - name: Resolve knockout matchups (standings -> knockout.csv)
        id: ko_resolve
        if: ${{ steps.ed.outputs.ko == 'true' }}
        continue-on-error: true
        run: python scripts/knockout.py --resolve | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Enter knockout results (The Odds API)
        id: ko_results
        if: ${{ steps.ed.outputs.ko == 'true' }}
        continue-on-error: true
        run: python scripts/fetch_ko_results.py | tee -a "$GITHUB_STEP_SUMMARY"

      # The 90-minute (regulation) score from ESPN's free feed, for ties that reached extra
      # time — it's what the knockout totals/handicap/BTTS bets settle on (a regulation game's
      # 90' score is its final, so most need nothing). Must run before settle. No-op when no
      # extra-time tie is awaiting its reg score.
      - name: Fetch knockout regulation (90') scores (ESPN)
        id: ko_reg
        if: ${{ steps.ed.outputs.ko == 'true' }}
        continue-on-error: true
        run: python scripts/fetch_ko_reg_scores.py | tee -a "$GITHUB_STEP_SUMMARY"

      # Generate Sonnet-grounded cards for newly-resolved ties (skips already-generated;
      # needs ANTHROPIC_API_KEY — fail-soft, the card slot placeholders without one).
      - name: Generate knockout cards (Sonnet, grounded)
        id: ko_cards
        if: ${{ steps.ed.outputs.ko == 'true' }}
        continue-on-error: true
        run: python scripts/knockout_cards.py "${{ steps.ed.outputs.date }}" | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Settle yesterday's picks (units + CLV)
        id: settle
        continue-on-error: true
        run: python scripts/odds.py settle | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Snapshot today's odds
        id: snapshot
        continue-on-error: true
        run: python scripts/odds.py fetch | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Evaluate edges + record picks
        id: evaluate
        continue-on-error: true
        run: python scripts/odds.py evaluate "${{ steps.ed.outputs.date }}" --record | tee -a "$GITHUB_STEP_SUMMARY"

      # Knockout advance edges (model-priced, 8pp ceiling). No-op unless a 2-way advance
      # line was entered (odds.py enter M.. advance H,A) — no market => honest "No bet".
      - name: Record knockout advance edges
        id: ko_evaluate
        if: ${{ steps.ed.outputs.ko == 'true' }}
        continue-on-error: true
        run: python scripts/odds.py evaluate-ko "${{ steps.ed.outputs.date }}" --record | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Weather forecast (Open-Meteo, no key needed)
        id: weather
        continue-on-error: true
        run: |
          python scripts/weather.py --date "${{ steps.ed.outputs.date }}" | tee -a "$GITHUB_STEP_SUMMARY"
          python scripts/weather.py --backfill | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Stakes blurb (Sonnet, grounded in computed data)
        id: blurb
        continue-on-error: true
        run: python scripts/stakes_blurb.py "${{ steps.ed.outputs.date }}"

      - name: News digest (UNVERIFIED, gated)
        id: news
        if: ${{ inputs.gather_news || vars.ENABLE_NEWS_DIGEST == 'true' }}
        continue-on-error: true
        run: python scripts/fetch_news.py "${{ steps.ed.outputs.date }}"

      - name: Build site
        run: python scripts/build_site.py --date "${{ steps.ed.outputs.date }}"

      - name: Build edition
        id: edition
        continue-on-error: true
        run: python scripts/build_edition.py "${{ steps.ed.outputs.date }}"

      # The hard test gate ran PRE-mutation; this guards the POST-mutation
      # artifact that actually gets published. Hard step: a broken build blocks
      # the push rather than deploying a corrupt page.
      - name: Smoke-check built output
        run: |
          test -s docs/index.html \
            || { echo "::error::docs/index.html missing/empty after build"; exit 1; }
          test -s "docs/data/${{ steps.ed.outputs.date }}.json" \
            || { echo "::error::snapshot json for ${{ steps.ed.outputs.date }} missing"; exit 1; }

      - name: Commit & push (push = deploy)
        run: |
          git config user.name "wc26-daily-bot"
          git config user.email "actions@users.noreply.github.com"
          # explicit allowlist: only the artifacts the daily build owns, so a
          # stray working-tree file can never ride along in an automated commit
          # (cards/ now includes generated knockout cards under cards/ko/)
          git add data docs editions cards
          [ -d news ] && git add news || true
          if git diff --cached --quiet; then
            echo "No changes today." >> "$GITHUB_STEP_SUMMARY"
          else
            git commit -m "Daily build ${{ steps.ed.outputs.date }} [automated]"
            git pull --rebase origin main
            git push
            echo "Published." >> "$GITHUB_STEP_SUMMARY"
          fi

      # Runs AFTER publishing so a degraded-but-buildable morning still ships,
      # then turns silent degradation into a red run (= notification email).
      - name: Health gate — fail loudly if any data step failed
        if: ${{ !cancelled() }}
        run: |
          failed=""
          [ "${{ steps.elo.outcome }}"      = "failure" ] && failed="$failed elo"
          [ "${{ steps.sdk.outcome }}"      = "failure" ] && failed="$failed sdk"
          [ "${{ steps.results.outcome }}"  = "failure" ] && failed="$failed results"
          [ "${{ steps.ko_resolve.outcome }}" = "failure" ] && failed="$failed ko_resolve"
          [ "${{ steps.ko_results.outcome }}" = "failure" ] && failed="$failed ko_results"
          [ "${{ steps.ko_reg.outcome }}"     = "failure" ] && failed="$failed ko_reg"
          [ "${{ steps.ko_ledger.outcome }}" = "failure" ] && failed="$failed ko_ledger"
          [ "${{ steps.ko_cards.outcome }}" = "failure" ] && failed="$failed ko_cards"
          [ "${{ steps.ko_evaluate.outcome }}" = "failure" ] && failed="$failed ko_evaluate"
          [ "${{ steps.settle.outcome }}"   = "failure" ] && failed="$failed settle"
          [ "${{ steps.ledger.outcome }}"   = "failure" ] && failed="$failed ledger"
          [ "${{ steps.snapshot.outcome }}" = "failure" ] && failed="$failed snapshot"
          [ "${{ steps.evaluate.outcome }}" = "failure" ] && failed="$failed evaluate"
          [ "${{ steps.weather.outcome }}"  = "failure" ] && failed="$failed weather"
          [ "${{ steps.blurb.outcome }}"    = "failure" ] && failed="$failed blurb"
          [ "${{ steps.news.outcome }}"     = "failure" ] && failed="$failed news"
          [ "${{ steps.edition.outcome }}"  = "failure" ] && failed="$failed edition"
          if [ -n "$failed" ]; then
            echo "::error::Degraded data steps:$failed"
            echo "DEGRADED:$failed" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "All data steps healthy." >> "$GITHUB_STEP_SUMMARY"
