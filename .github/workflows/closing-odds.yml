name: closing-odds

# Two light snapshots per day tagged phase=closing, feeding the odds engine's
# CLV calculation (closing implied minus snapshot implied on our picks).
# 15:30 UTC = 11:30 AM ET (before the earliest 12:00 PM kickoffs);
# 22:30 UTC = 6:30 PM ET (before the evening slate). Imperfect closing
# lines, honest ones: the engine uses the latest closing row per market.

on:
  schedule:
    - cron: "30 15 * * *"
    - cron: "30 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: closing-odds

jobs:
  snapshot:
    runs-on: ubuntu-latest
    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Closing snapshot
        run: python scripts/odds.py fetch --phase closing | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Commit & push
        run: |
          git config user.name "wc26-daily-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/odds_log.csv
          if git diff --cached --quiet; then
            echo "No new closing rows." >> "$GITHUB_STEP_SUMMARY"
          else
            git commit -m "Closing odds snapshot [automated]"
            git pull --rebase origin main
            git push
          fi
