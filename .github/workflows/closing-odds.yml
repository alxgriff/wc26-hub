name: closing-odds

# Evening / intra-day pipeline. Originally just closing-line snapshots (feeding
# the CLV calc). Now each run ALSO: re-snapshots odds (one fetch, tagged BOTH
# snapshot+closing), enters results, settles finished picks, RECORDS late-posted
# edges, and rebuilds — so scores AND the record update SAME-DAY instead of waiting
# for the 7 AM daily-build. (Single-book DraftKings posts the moneyline early but
# totals/spreads later; the 7 AM run's stale-line picks get refused by the 12h
# freshness gate, so this re-record catches them once the line is fresh.)
# Four ET capture points:
#   15:30 UTC = 11:30 AM ET  (before the noon kickoffs — no results yet)
#   22:30 UTC =  6:30 PM ET  (after the afternoon games)
#   00:30 UTC =  8:30 PM ET prev ET day  (after the ~6-7 PM games)
#   03:30 UTC = 11:30 PM ET prev ET day  (after the ~9-11 PM games)
# fetch_results enters only COMPLETED games and odds.py settle only settles played
# picks, so the new steps are harmless no-ops when nothing has finished (incl. the
# 11:30 AM run). In-play events are skipped by both fetchers — late runs never
# pollute. Each evening run catches the games finished since the previous one; the
# 7 AM build remains the backstop that closes out the late-cap (12 AM ET) games.
#
# Like daily-build: fail-soft data steps (a dead API never blocks the publish);
# build_site is the HARD gate. NO pre-mutation test gate here on purpose — by the
# evening the committed data has played games, and several point-in-time site/honesty
# tests would false-red on it (which is exactly why the morning build runs tests
# pre-its-own-mutation). A successful build is the gate.

on:
  schedule:
    # Whole tournament (group + knockout), June 12 through the July 19 final. The
    # same-ET-day captures (11:30 AM / 6:30 PM ET) run on the calendar date; the late
    # captures (8:30 / 11:30 PM ET) fall on the NEXT UTC day, so their ranges start and
    # end one day later (through July 20 for the July 19 final's evening). Two ranges
    # each because a cron day-of-month field can't cross the June/July boundary.
    - cron: "30 15 12-30 6 *"   # 11:30 AM ET, June
    - cron: "30 15 1-19 7 *"    # 11:30 AM ET, July
    - cron: "30 22 12-30 6 *"   #  6:30 PM ET, June
    - cron: "30 22 1-19 7 *"    #  6:30 PM ET, July
    - cron: "30 0 13-30 6 *"    #  8:30 PM ET (prev ET day), June
    - cron: "30 0 1-20 7 *"     #  8:30 PM ET (prev ET day), July
    - cron: "30 3 13-30 6 *"    # 11:30 PM ET (prev ET day), June
    - cron: "30 3 1-20 7 *"     # 11:30 PM ET (prev ET day), July
  workflow_dispatch:

permissions:
  contents: write

# Same group as daily-build: serializes every workflow that pushes to main, so an
# intra-day run never races the morning build or another closing run mid-push.
concurrency:
  group: wc26-publish
  cancel-in-progress: false

defaults:
  run:
    shell: bash   # explicit bash => pipefail, so a failed fetch is a red run

jobs:
  snapshot:
    runs-on: ubuntu-latest
    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Editorial date (ET)
        id: ed
        run: |
          DATE="$(TZ=America/New_York date +%F)"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          # knockout gate (R32 starts 2026-06-28): KO steps dormant through the group stage
          KO=$([[ "$DATE" > "2026-06-27" ]] && echo true || echo false)
          echo "ko=$KO" >> "$GITHUB_OUTPUT"
          echo "Editorial date: $DATE (knockout=$KO)" >> "$GITHUB_STEP_SUMMARY"

      # ONE API call, tagged BOTH snapshot (feeds intra-day recording below) and
      # closing (feeds CLV). Single-book DraftKings posts the moneyline early but
      # totals/spreads later, so this re-snapshot is what makes them recordable.
      - name: Snapshot + closing line (one fetch, both phases)
        id: snapshot
        continue-on-error: true
        run: python scripts/odds.py fetch --phase both | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Enter results so far (The Odds API — completed games only)
        id: results
        continue-on-error: true
        run: python scripts/fetch_results.py | tee -a "$GITHUB_STEP_SUMMARY"

      # Knockout stage (no-op until ties resolve): refresh matchups from the standings
      # just updated, then enter any completed knockout scores so the bracket + record
      # update same-day. Level/penalty results are reported for manual entry.
      - name: Resolve + enter knockout results
        id: ko
        if: ${{ steps.ed.outputs.ko == 'true' }}
        continue-on-error: true
        run: |
          python scripts/knockout.py --resolve | tee -a "$GITHUB_STEP_SUMMARY"
          python scripts/fetch_ko_results.py | tee -a "$GITHUB_STEP_SUMMARY"

      # Roll Elo forward through the results just entered, so this run's re-recorded edges
      # and rebuilt previews use current Elo. Fail-soft (model falls back to VERIFIED).
      - name: Update Elo (roll verified baseline through WC results)
        id: elo
        continue-on-error: true
        run: python scripts/update_elo.py | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Settle finished picks (units + CLV, incl. the shadow book)
        id: settle
        continue-on-error: true
        run: python scripts/odds.py settle | tee -a "$GITHUB_STEP_SUMMARY"

      # Record picks whose fresh line only posted AFTER the 7 AM build (e.g. DK's
      # totals/spreads). Day-of + pre-kickoff + <12h-snapshot gates still apply, and
      # already-recorded picks are left untouched — so this only ADDS late-posted edges.
      - name: Record late-posted edges (day-of, pre-kickoff, fresh only)
        id: evaluate
        continue-on-error: true
        run: python scripts/odds.py evaluate "${{ steps.ed.outputs.date }}" --record | tee -a "$GITHUB_STEP_SUMMARY"

      # Knockout advance edges intra-day (no-op unless a 2-way advance line was entered).
      - name: Record knockout advance edges
        id: ko_evaluate
        if: ${{ steps.ed.outputs.ko == 'true' }}
        continue-on-error: true
        run: python scripts/odds.py evaluate-ko "${{ steps.ed.outputs.date }}" --record | tee -a "$GITHUB_STEP_SUMMARY"

      # Experimental edge-hypothesis tracker (deserved-result divergence). Fail-soft and
      # deliberately NOT in the health gate below — a tracker bug must never block the
      # publish. `log` appends qualifying upcoming picks priced off the fresh snapshot
      # market; `report` computes CLV-by-tag against TRUE closing lines and settles
      # finished picks. Paper only (stake 0); writes data/edge_drd_log.csv (in `git add data`).
      - name: DRD edge tracker — log qualifying picks (paper)
        continue-on-error: true
        run: python scripts/edge_drd.py log | tee -a "$GITHUB_STEP_SUMMARY"

      - name: DRD edge tracker — settle + CLV-by-tag
        continue-on-error: true
        run: python scripts/edge_drd.py report | tee -a "$GITHUB_STEP_SUMMARY"

      # HARD gate — a broken build blocks the push rather than deploying a corrupt page.
      - name: Build site
        run: python scripts/build_site.py --date "${{ steps.ed.outputs.date }}"

      - name: Build edition (recap reflects the new results)
        id: edition
        continue-on-error: true
        run: python scripts/build_edition.py "${{ steps.ed.outputs.date }}"

      - name: Smoke-check built output
        run: |
          test -s docs/index.html \
            || { echo "::error::docs/index.html missing/empty after build"; exit 1; }

      - name: Commit & push (push = deploy)
        run: |
          git config user.name "wc26-daily-bot"
          git config user.email "actions@users.noreply.github.com"
          # explicit allowlist: only the artifacts this job owns
          git add data docs editions
          if git diff --cached --quiet; then
            echo "No changes." >> "$GITHUB_STEP_SUMMARY"
          else
            git commit -m "Intra-day update ${{ steps.ed.outputs.date }} [automated]"
            git pull --rebase origin main
            git push
            echo "Published." >> "$GITHUB_STEP_SUMMARY"
          fi

      # Runs AFTER publishing so a degraded-but-buildable run still ships, then turns
      # silent degradation into a red run (= notification email).
      - name: Health gate — fail loudly if a data step failed
        if: ${{ !cancelled() }}
        run: |
          failed=""
          [ "${{ steps.elo.outcome }}"      = "failure" ] && failed="$failed elo"
          [ "${{ steps.snapshot.outcome }}" = "failure" ] && failed="$failed snapshot"
          [ "${{ steps.results.outcome }}"  = "failure" ] && failed="$failed results"
          [ "${{ steps.ko.outcome }}"       = "failure" ] && failed="$failed ko"
          [ "${{ steps.settle.outcome }}"   = "failure" ] && failed="$failed settle"
          [ "${{ steps.evaluate.outcome }}" = "failure" ] && failed="$failed evaluate"
          [ "${{ steps.ko_evaluate.outcome }}" = "failure" ] && failed="$failed ko_evaluate"
          [ "${{ steps.edition.outcome }}"  = "failure" ] && failed="$failed edition"
          if [ -n "$failed" ]; then
            echo "::error::Degraded data steps:$failed"
            echo "DEGRADED:$failed" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "All data steps healthy." >> "$GITHUB_STEP_SUMMARY"
