name: closing-odds

# Two light snapshots per day tagged phase=closing, feeding the odds engine's
# CLV calculation (closing implied minus snapshot implied on our picks).
# 15:30 UTC = 11:30 AM ET (before the earliest 12:00 PM kickoffs);
# 22:30 UTC = 6:30 PM ET (before the evening slate). Imperfect closing
# lines, honest ones: the engine uses the latest closing row per market.

on:
  schedule:
    # June only — no closing lines needed after the last group game (Jun 27).
    # Four ET capture points bracket the kickoff spread (12 PM - 12 AM ET):
    #   15:30 UTC = 11:30 AM ET  (before the noon kickoffs)
    #   22:30 UTC =  6:30 PM ET  (before the evening slate)
    #   00:30 UTC =  8:30 PM ET prev. ET day (before the 9-11 PM games)
    #   03:30 UTC = 11:30 PM ET prev. ET day (before the midnight late-caps)
    # In-play events are skipped by the fetcher, so late runs never pollute.
    - cron: "30 15 12-27 6 *"
    - cron: "30 22 12-27 6 *"
    - cron: "30 0 13-28 6 *"
    - cron: "30 3 13-28 6 *"
  workflow_dispatch:

permissions:
  contents: write

# Same group as daily-build: serializes every workflow that pushes to main.
concurrency:
  group: wc26-publish

defaults:
  run:
    shell: bash   # explicit bash => pipefail, so a failed fetch is a red run

jobs:
  snapshot:
    runs-on: ubuntu-latest
    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Closing snapshot
        run: python scripts/odds.py fetch --phase closing | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Commit & push
        run: |
          git config user.name "wc26-daily-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/odds_log.csv
          if git diff --cached --quiet; then
            echo "No new closing rows." >> "$GITHUB_STEP_SUMMARY"
          else
            git commit -m "Closing odds snapshot [automated]"
            git pull --rebase origin main
            git push
          fi
